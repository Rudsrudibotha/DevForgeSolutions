name: Deploy Node.js app to Azure Web App - devforgesolutions-saas-app-24

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: azure-production-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Smoke test application startup
        run: node -e "const { app } = require('./src/app'); if (!app) process.exit(1); console.log('Express app loaded')"

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_709E587A00FC428282A6B13D227D938F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_83C034F08B6F47ECB73178D7D1CDE1AA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_957216CA4DF34E498637032CD17A2E53 }}

      - name: Configure Azure package deployment
        run: |
          az webapp config appsettings set \
            --name devforgesolutions-saas-app-24 \
            --resource-group devforge-saas-rg \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false

      - name: Create deployment package
        run: |
          rm -f release.zip
          zip -r release.zip . \
            -x "release.zip" \
            -x ".git/*" \
            -x ".github/*" \
            -x ".env" \
            -x "*.log" \
            -x "azure-logs/*" \
            -x "backup/*" \
            -x "test-results/*" \
            -x ".venv/*" \
            -x ".vscode/*"

      - name: Publish package and restart Azure Web App
        run: |
          storage_account="devforgepkgdfs24"
          container="app-packages"
          blob_name="release-${GITHUB_SHA}.zip"
          expiry=$(date -u -d "30 days" '+%Y-%m-%dT%H:%MZ')
          storage_key=$(az storage account keys list \
            --account-name "$storage_account" \
            --resource-group devforge-saas-rg \
            --query "[0].value" \
            -o tsv)

          az storage container create \
            --account-name "$storage_account" \
            --account-key "$storage_key" \
            --name "$container" \
            --public-access off \
            --output none

          az storage blob upload \
            --account-name "$storage_account" \
            --account-key "$storage_key" \
            --container-name "$container" \
            --name "$blob_name" \
            --file release.zip \
            --overwrite true \
            --output none

          sas=$(az storage blob generate-sas \
            --account-name "$storage_account" \
            --account-key "$storage_key" \
            --container-name "$container" \
            --name "$blob_name" \
            --permissions r \
            --expiry "$expiry" \
            --https-only \
            -o tsv)
          package_url="https://${storage_account}.blob.core.windows.net/${container}/${blob_name}?${sas}"

          az webapp config appsettings set \
            --name devforgesolutions-saas-app-24 \
            --resource-group devforge-saas-rg \
            --settings WEBSITE_RUN_FROM_PACKAGE="$package_url" SCM_DO_BUILD_DURING_DEPLOYMENT=false ENABLE_ORYX_BUILD=false \
            --output none

          az webapp restart \
            --name devforgesolutions-saas-app-24 \
            --resource-group devforge-saas-rg \
            --output none

      - name: Verify Azure health
        run: |
          for attempt in {1..30}; do
            status=$(curl -sS -o /tmp/health.json -w "%{http_code}" https://devforgesolutions-saas-app-24.azurewebsites.net/health || true)
            if [ "$status" = "200" ]; then
              cat /tmp/health.json
              exit 0
            fi

            echo "Health check attempt ${attempt} returned ${status}; waiting..."
            sleep 10
          done

          cat /tmp/health.json || true
          exit 1
