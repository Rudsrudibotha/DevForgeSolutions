name: Deploy Node.js app to Azure Web App - devforgesolutions-saas-app-24

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Show deployment context
        run: |
          node --version
          npm --version
          test -f package.json
          test -f src/app.js

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_709E587A00FC428282A6B13D227D938F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_83C034F08B6F47ECB73178D7D1CDE1AA }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_957216CA4DF34E498637032CD17A2E53 }}

      - name: Configure Azure Web App
        run: |
          az webapp config appsettings set \
            --resource-group devforge-saas-rg \
            --name devforgesolutions-saas-app-24 \
            --settings SCM_DO_BUILD_DURING_DEPLOYMENT=true WEBSITE_NODE_DEFAULT_VERSION=~20
          az webapp config set \
            --resource-group devforge-saas-rg \
            --name devforgesolutions-saas-app-24 \
            --startup-file "npm start"

      - name: Deploy to Azure Web App
        run: |
          zip -r app.zip . \
            -x ".git/*" \
            -x ".env" \
            -x "node_modules/*" \
            -x "deploy.zip"
          az webapp deploy \
            --resource-group devforge-saas-rg \
            --name devforgesolutions-saas-app-24 \
            --src-path app.zip \
            --type zip \
            --async false
