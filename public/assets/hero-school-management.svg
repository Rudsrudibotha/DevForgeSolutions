<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 520" role="img" aria-label="Isometric illustration of a school management dashboard with invoices, attendance and messaging" fill="none">
  <defs>
    <linearGradient id="kchSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eef4ff"/>
      <stop offset="1" stop-color="#dae6ff"/>
    </linearGradient>
    <linearGradient id="kchFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b66f5"/>
      <stop offset="1" stop-color="#274be0"/>
    </linearGradient>
    <linearGradient id="kchFaceDark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f3bb4"/>
      <stop offset="1" stop-color="#1c306f"/>
    </linearGradient>
    <linearGradient id="kchCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
    <filter id="kchShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#1c306f" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- backdrop -->
  <circle cx="320" cy="250" r="250" fill="url(#kchSky)"/>
  <circle cx="500" cy="120" r="46" fill="#ffffff" opacity="0.6"/>
  <circle cx="120" cy="150" r="26" fill="#ffffff" opacity="0.5"/>

  <!-- floating attendance card (back left) -->
  <g filter="url(#kchShadow)" transform="translate(70 250)">
    <rect width="190" height="120" rx="14" fill="url(#kchCard)"/>
    <rect x="18" y="20" width="84" height="10" rx="5" fill="#1c306f"/>
    <rect x="18" y="40" width="150" height="7" rx="3.5" fill="#cbd5e1"/>
    <g transform="translate(18 64)">
      <rect width="22" height="22" rx="6" fill="#dae6ff"/><rect x="2" y="2" width="18" height="18" rx="4" fill="#3b66f5"/>
      <rect x="30" width="22" height="22" rx="6" fill="#dae6ff"/><rect x="32" y="2" width="18" height="18" rx="4" fill="#3b66f5"/>
      <rect x="60" width="22" height="22" rx="6" fill="#dae6ff"/><rect x="62" y="2" width="18" height="18" rx="4" fill="#94a3b8"/>
      <rect x="90" width="22" height="22" rx="6" fill="#dae6ff"/><rect x="92" y="2" width="18" height="18" rx="4" fill="#3b66f5"/>
      <rect x="120" width="22" height="22" rx="6" fill="#dae6ff"/><rect x="122" y="2" width="18" height="18" rx="4" fill="#3b66f5"/>
    </g>
    <rect x="18" y="98" width="60" height="7" rx="3.5" fill="#94a3b8"/>
  </g>

  <!-- central isometric school building -->
  <g transform="translate(250 150)">
    <!-- roof -->
    <path d="M120 0 L240 70 L120 140 L0 70 Z" fill="#90b3ff"/>
    <path d="M120 18 L210 70 L120 122 L30 70 Z" fill="#bdd2ff"/>
    <!-- left wall -->
    <path d="M0 70 L120 140 L120 250 L0 180 Z" fill="url(#kchFaceDark)"/>
    <!-- right wall -->
    <path d="M240 70 L120 140 L120 250 L240 180 Z" fill="url(#kchFace)"/>
    <!-- clock / emblem -->
    <circle cx="120" cy="74" r="16" fill="#ffffff"/>
    <circle cx="120" cy="74" r="16" fill="none" stroke="#274be0" stroke-width="2"/>
    <path d="M120 66 L120 74 L126 78" stroke="#274be0" stroke-width="2" stroke-linecap="round"/>
    <!-- windows left -->
    <g fill="#90b3ff" opacity="0.9">
      <rect x="22" y="120" width="26" height="26" rx="3" transform="skewY(30)"/>
      <rect x="62" y="120" width="26" height="26" rx="3" transform="skewY(30)"/>
    </g>
    <!-- windows right -->
    <g fill="#dae6ff" opacity="0.95">
      <rect x="150" y="35" width="26" height="26" rx="3" transform="skewY(-30)"/>
      <rect x="190" y="35" width="26" height="26" rx="3" transform="skewY(-30)"/>
      <rect x="150" y="80" width="26" height="26" rx="3" transform="skewY(-30)"/>
      <rect x="190" y="80" width="26" height="26" rx="3" transform="skewY(-30)"/>
    </g>
    <!-- door -->
    <path d="M150 145 L176 130 L176 188 L150 203 Z" fill="#1c306f"/>
  </g>

  <!-- floating invoice/payment card (front right) -->
  <g filter="url(#kchShadow)" transform="translate(360 300)">
    <rect width="210" height="140" rx="16" fill="url(#kchCard)"/>
    <rect x="20" y="22" width="70" height="9" rx="4.5" fill="#1c306f"/>
    <rect x="20" y="40" width="120" height="6" rx="3" fill="#cbd5e1"/>
    <!-- amount -->
    <rect x="20" y="62" width="96" height="16" rx="4" fill="#274be0"/>
    <rect x="124" y="64" width="40" height="12" rx="6" fill="#dcfce7"/>
    <path d="M133 70 l4 4 l8 -8" stroke="#16a34a" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- bar chart -->
    <g transform="translate(20 96)">
      <rect y="20" width="14" height="22" rx="3" fill="#bdd2ff"/>
      <rect x="22" y="10" width="14" height="32" rx="3" fill="#608aff"/>
      <rect x="44" y="2" width="14" height="40" rx="3" fill="#274be0"/>
      <rect x="66" y="16" width="14" height="26" rx="3" fill="#90b3ff"/>
      <rect x="88" y="6" width="14" height="36" rx="3" fill="#3b66f5"/>
    </g>
    <rect x="150" y="104" width="44" height="30" rx="8" fill="#eef4ff"/>
    <path d="M160 119 h24 M160 119 l6 -6 M160 119 l6 6" stroke="#274be0" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- chat bubble (top right) -->
  <g filter="url(#kchShadow)" transform="translate(430 150)">
    <path d="M0 16 a16 16 0 0 1 16 -16 h80 a16 16 0 0 1 16 16 v44 a16 16 0 0 1 -16 16 h-60 l-22 18 v-18 h2 a16 16 0 0 1 -16 -16 Z" fill="url(#kchFace)"/>
    <rect x="18" y="22" width="76" height="7" rx="3.5" fill="#ffffff" opacity="0.95"/>
    <rect x="18" y="38" width="50" height="7" rx="3.5" fill="#ffffff" opacity="0.7"/>
  </g>
</svg>
